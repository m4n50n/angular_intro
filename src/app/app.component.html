<!-- Entre llaves podemos poner el valor de un string creado en el fichero .ts o cualquier expresión de JavaScript, como por ejemplo {{ 1 + 1  }} -->
<h1>{{ titulo }}</h1>
<h3>La base es {{base}}</h3>

<!-- Los eventos son definidos con paréntesis. Dos formas de hacerlo: -->
<!--<button (click)="numero = numero - 1">- 1</button>--> <!-- En este caso no hace falta poner this.numero, puesto que al ser el template del componente lo coge directamente -->
<button (click)="operar(-base)">- {{base}}</button>
<span>{{ numero }}</span>
<button (click)="operar(base)">+ {{base}}</button>
